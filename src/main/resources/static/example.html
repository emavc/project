<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        .table-container {
            width: 95%;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #007bff;
            color: white;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        .low-stock {
            color: red;
            font-weight: bold;
        }

        .top-links {
            text-align: center;
            margin-top: 20px;
        }

        .top-links a {
            margin: 0 10px;
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }

        .search-box {
            text-align: center;
            margin-bottom: 20px;
        }

        .search-box input {
            width: 600px;
            max-width: 90%;
            padding: 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .role-box {
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
            color: #444;
        }

        .edit-btn {
            padding: 6px 12px;
            background: #ffc107;
            color: black;
            border-radius: 4px;
            text-decoration: none;
            margin-right: 5px;
            display: inline-block;
        }

        .delete-btn {
            padding: 6px 12px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .view-only {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>

<h2>Product List</h2>

<div class="role-box" id="roleBox">Loading user role...</div>

<div class="top-links">
    <a href="/dashboard.html">Dashboard</a> |
    <a href="/product.html">Add Product</a>
</div>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search by name, code, or barcode" onkeyup="filterProducts()">
</div>

<div class="table-container">
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Code</th>
            <th>Barcode</th>
            <th>Category</th>
            <th>Buying Price</th>
            <th>Selling Price</th>
            <th>Quantity</th>
            <th>Low Stock Level</th>
            <th>Base Unit</th>
            <th>Package Name</th>
            <th>Units Per Package</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody id="productTableBody"></tbody>
    </table>
</div>

<script>
    let allProducts = [];
    let currentRole = "";

    async function loadCurrentUser() {
        try {
            const response = await fetch("/api/auth/me");
            if (!response.ok) {
                throw new Error("Failed to load user info");
            }

            const user = await response.json();
            currentRole = user.role || "";

            const roleBox = document.getElementById("roleBox");
            roleBox.textContent = `Logged in as: ${user.username} (${currentRole})`;
        } catch (error) {
            console.error("Error loading current user:", error);
            document.getElementById("roleBox").textContent = "Failed to load user role";
        }
    }

    async function loadProducts() {
        try {
            const response = await fetch("/api/products/all");
            if (!response.ok) {
                throw new Error("Failed to load products");
            }

            const products = await response.json();
            allProducts = products;
            renderProducts(products);
        } catch (error) {
            console.error("Error loading products:", error);
        }
    }

    function renderProducts(products) {
        const tableBody = document.getElementById("productTableBody");
        tableBody.innerHTML = "";

        products.forEach(product => {
            const row = document.createElement("tr");
            const isLowStock = product.quantity <= product.lowStockLevel;

            let actionHtml = `<span class="view-only">View Only</span>`;

            if (currentRole === "ROLE_ADMIN") {
                actionHtml = `
                    <a href="/edit-product.html?id=${product.id}" class="edit-btn">Edit</a>
                    <button onclick="deleteProduct(${product.id})" class="delete-btn">Delete</button>
                `;
            }

            row.innerHTML = `
                <td>${product.id ?? ""}</td>
                <td>${product.name ?? ""}</td>
                <td>${product.productCode ?? ""}</td>
                <td>${product.barcode ?? ""}</td>
                <td>${product.category ?? ""}</td>
                <td>${product.buyingPrice ?? ""}</td>
                <td>${product.sellingPrice ?? ""}</td>
                <td class="${isLowStock ? 'low-stock' : ''}">${product.quantity ?? ""}</td>
                <td>${product.lowStockLevel ?? ""}</td>
                <td>${product.baseUnit ?? ""}</td>
                <td>${product.packageName ?? ""}</td>
                <td>${product.unitsPerPackage ?? product.unitPerPackage ?? ""}</td>
                <td>${actionHtml}</td>
            `;

            tableBody.appendChild(row);
        });
    }

    function filterProducts() {
        const searchValue = document.getElementById("searchInput").value.toLowerCase();

        const filteredProducts = allProducts.filter(product =>
            (product.name ?? "").toLowerCase().includes(searchValue) ||
            (product.productCode ?? "").toLowerCase().includes(searchValue) ||
            (product.barcode ?? "").toLowerCase().includes(searchValue)
        );

        renderProducts(filteredProducts);
    }

    async function deleteProduct(id) {
        if (currentRole !== "ROLE_ADMIN") {
            alert("Only admin can delete products.");
            return;
        }

        const confirmDelete = confirm("Are you sure you want to delete this product?");
        if (!confirmDelete) return;

        try {
            const response = await fetch(`/api/products/delete/${id}`, {
                method: "DELETE"
            });

            if (!response.ok) {
                throw new Error("Failed to delete product");
            }

            allProducts = allProducts.filter(product => product.id !== id);
            renderProducts(allProducts);

            alert("Product deleted successfully.");
        } catch (error) {
            alert("Error deleting product.");
            console.error(error);
        }
    }

    async function initPage() {
        await loadCurrentUser();
        await loadProducts();
    }

    initPage();
</script>

</body>
</html>
