<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMAVCMEN</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #081226, #0d2a52, #123d73);
            color: white;
            overflow: hidden;
        }

        .splash-container {
            text-align: center;
            animation: fadeIn 1.2s ease-in-out;
        }

        .logo-box {
            margin-bottom: 20px;
        }

        .logo-box img {
            width: 140px;
            max-width: 80%;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        .brand-name {
            font-size: 42px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 25px;
        }

        .loading {
            width: 220px;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            margin: 0 auto;
            overflow: hidden;
        }

        .loading-bar {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, #f7b500, #00c6ff);
            border-radius: 20px;
            animation: loadBar 2.5s linear forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes loadBar {
            from {
                width: 0;
            }
            to {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="logo-box">
            <img src="/logo.png" style="width:140px;" alt="EMAVCMEN Logo">
            
        </div>

        <div class="brand-name">EMAVCMEN</div>
        <div class="tagline">Build • Create • Succeed</div>

        <div class="loading">
            <div class="loading-bar"></div>
        </div>
    </div>

    <script>
        setTimeout(() => {
            window.location.href = "/login.html";
        }, 2500);
    </script>
</body>
</html>
