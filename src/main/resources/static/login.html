<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EMAVCMEN</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #081226, #0d2a52, #123d73);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 30px;
            width: 360px;
            border-radius: 14px;
            box-shadow: 0 0 20px rgba(0,0,0,0.25);
        }

        .brand {
            text-align: center;
            margin-bottom: 20px;
        }

        .brand img {
            width: 90px;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .brand-name {
            font-size: 22px;
            font-weight: bold;
            color: #0d2a52;
        }

        .tagline {
            font-size: 13px;
            color: #666;
        }

        h2 {
            text-align: center;
            margin: 20px 0;
            color: #007bff;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 11px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 6px;
            margin-top: 10px;
        }

        button:hover {
            background: #0056b3;
        }

        .message {
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
            padding: 8px;
            border-radius: 6px;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .demo {
            margin-top: 20px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            text-align: center;
        }

        .footer {
            margin-top: 15px;
            text-align: center;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="login-box">

    <!-- 🔥 BRAND HEADER -->
    <div class="brand">
        <img src="/logo.png" alt="EMAVCMEN Logo">
        <div class="brand-name">EMAVCMEN</div>
        <div class="tagline">Build • Create • Succeed</div>
    </div>

    <h2>System Login</h2>

    <div id="messageBox" class="message"></div>

    <form method="POST" action="/perform_login">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="demo">
        <strong>Demo users:</strong><br>
        admin / admin123<br>
        cashier / cashier123
    </div>

    <div class="footer">
        © 2026 EMAVCMEN
    </div>

</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const box = document.getElementById("messageBox");

    if (params.has("error")) {
        box.textContent = "Invalid username or password";
        box.className = "message error";
    }

    if (params.has("logout")) {
        box.textContent = "You have logged out successfully";
        box.className = "message success";
    }
</script>

</body>
</html>
