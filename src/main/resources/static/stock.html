<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            background: #fff;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .top-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .top-bar input {
            flex: 1;
            min-width: 250px;
            padding: 10px;
            font-size: 15px;
        }

        .top-bar button {
            padding: 10px 16px;
            border: none;
            background: #007bff;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .top-bar button:hover {
            background: #0056b3;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
            font-size: 14px;
        }

        th {
            background: #007bff;
            color: white;
        }

        .low-stock {
            background-color: #ffe5e5;
        }

        .normal-stock {
            background-color: #eafbea;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }

        .badge-low {
            background: #dc3545;
            color: white;
        }

        .badge-ok {
            background: #28a745;
            color: white;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

        @media (max-width: 768px) {
            table {
                font-size: 12px;
            }

            .top-bar {
                flex-direction: column;
            }

            .top-bar input,
            .top-bar button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Stock List</h1>

    <div id="messageBox" class="message error"></div>

    <div class="top-bar">
        <input type="text" id="searchInput" placeholder="Search by name, code, barcode, or category">
        <button onclick="searchProducts()">Search</button>
        <button onclick="loadProducts()">Refresh</button>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Product Code</th>
            <th>Barcode</th>
            <th>Category</th>
            <th>Buying Price</th>
            <th>Selling Price</th>
            <th>Quantity</th>
            <th>Low Stock Level</th>
            <th>Status</th>
        </tr>
        </thead>
        <tbody id="productTableBody"></tbody>
    </table>
</div>

<script>
    const API_BASE = "http://localhost:8080/api/stock";

    function showError(message) {
        const box = document.getElementById("messageBox");
        box.style.display = "block";
        box.textContent = message;
    }

    function hideError() {
        const box = document.getElementById("messageBox");
        box.style.display = "none";
        box.textContent = "";
    }

    function renderProducts(products) {
        const tableBody = document.getElementById("productTableBody");
        tableBody.innerHTML = "";

        if (!products || products.length === 0) {
            tableBody.innerHTML = `
                <tr>
                    <td colspan="10" style="text-align:center;">No products found</td>
                </tr>
            `;
            return;
        }

        products.forEach(product => {
            const isLowStock = product.quantity <= product.lowStockLevel;

            const row = `
                <tr class="${isLowStock ? 'low-stock' : 'normal-stock'}">
                    <td>${product.id ?? ""}</td>
                    <td>${product.name ?? ""}</td>
                    <td>${product.productCode ?? ""}</td>
                    <td>${product.barcode ?? ""}</td>
                    <td>${product.category ?? ""}</td>
                    <td>${product.buyingPrice ?? ""}</td>
                    <td>${product.sellingPrice ?? ""}</td>
                    <td>${product.quantity ?? ""}</td>
                    <td>${product.lowStockLevel ?? ""}</td>
                    <td>
                        <span class="badge ${isLowStock ? 'badge-low' : 'badge-ok'}">
                            ${isLowStock ? 'Low Stock' : 'In Stock'}
                        </span>
                    </td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    }

    async function loadProducts() {
        hideError();
        try {
            const response = await fetch(`${API_BASE}/products`);
            if (!response.ok) {
                throw new Error("Failed to load products");
            }

            const products = await response.json();
            renderProducts(products);
        } catch (error) {
            showError(error.message);
        }
    }

    async function searchProducts() {
        hideError();
        const keyword = document.getElementById("searchInput").value.trim();

        try {
            const response = await fetch(`${API_BASE}/search?keyword=${encodeURIComponent(keyword)}`);
            if (!response.ok) {
                throw new Error("Failed to search products");
            }

            const products = await response.json();
            renderProducts(products);
        } catch (error) {
            showError(error.message);
        }
    }

    loadProducts();
</script>
</body>
</html>
