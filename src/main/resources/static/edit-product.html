<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        .top-links {
            text-align: center;
            margin-bottom: 20px;
        }

        .top-links a {
            text-decoration: none;
            margin: 0 10px;
            color: #007bff;
            font-weight: bold;
        }

        .container {
            width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.08);
        }

        h2 {
            text-align: center;
            margin-top: 0;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1f7f35;
        }

        .message {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>

    <div class="top-links">
        <a href="/dashboard.html">Dashboard</a>
        <a href="/products.html">Products</a>
    </div>

    <div class="container">
        <h2>Edit Product</h2>

        <form id="editProductForm">
            <label>Product Name</label>
            <input type="text" id="name" required>

            <label>Product Code</label>
            <input type="text" id="productCode" required>

            <label>Barcode</label>
            <input type="text" id="barcode" required>

            <label>Category</label>
            <input type="text" id="category" required>

            <label>Buying Price</label>
            <input type="number" id="buyingPrice" step="0.01" required>

            <label>Selling Price</label>
            <input type="number" id="sellingPrice" step="0.01" required>

            <label>Quantity</label>
            <input type="number" id="quantity" required>

            <label>Low Stock Level</label>
            <input type="number" id="lowStockLevel" required>

            <label>Base Unit</label>
            <input type="text" id="baseUnit" required>

            <label>Package Name</label>
            <input type="text" id="packageName">

            <label>Units Per Package</label>
            <input type="number" id="unitsPerPackage">

            <button type="submit">Update Product</button>
        </form>

        <div id="message" class="message"></div>
    </div>

    <script>
        function getProductIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get("id");
        }

        async function loadProduct() {
            const productId = getProductIdFromUrl();
            const messageDiv = document.getElementById("message");

            if (!productId) {
                messageDiv.textContent = "Product ID not found in URL.";
                messageDiv.className = "message error";
                return;
            }

            try {
                const response = await fetch(`/api/products/${productId}`);

                if (!response.ok) {
                    throw new Error("Failed to load product");
                }

                const product = await response.json();

                document.getElementById("name").value = product.name;
                document.getElementById("productCode").value = product.productCode;
                document.getElementById("barcode").value = product.barcode;
                document.getElementById("category").value = product.category;
                document.getElementById("buyingPrice").value = product.buyingPrice;
                document.getElementById("sellingPrice").value = product.sellingPrice;
                document.getElementById("quantity").value = product.quantity;
                document.getElementById("lowStockLevel").value = product.lowStockLevel;
                document.getElementById("baseUnit").value = product.baseUnit;
                document.getElementById("packageName").value = product.packageName ?? "";
                document.getElementById("unitsPerPackage").value = product.unitsPerPackage ?? "";

            } catch (error) {
                messageDiv.textContent = "Error loading product.";
                messageDiv.className = "message error";
                console.error(error);
            }
        }

        document.getElementById("editProductForm").addEventListener("submit", async function(event) {
            event.preventDefault();

            const productId = getProductIdFromUrl();
            const messageDiv = document.getElementById("message");

            const updatedProduct = {
                name: document.getElementById("name").value,
                productCode: document.getElementById("productCode").value,
                barcode: document.getElementById("barcode").value,
                category: document.getElementById("category").value,
                buyingPrice: parseFloat(document.getElementById("buyingPrice").value),
                sellingPrice: parseFloat(document.getElementById("sellingPrice").value),
                quantity: parseInt(document.getElementById("quantity").value),
                lowStockLevel: parseInt(document.getElementById("lowStockLevel").value),
                baseUnit: document.getElementById("baseUnit").value,
                packageName: document.getElementById("packageName").value,
                unitsPerPackage: document.getElementById("unitsPerPackage").value
                    ? parseInt(document.getElementById("unitsPerPackage").value)
                    : null
            };

            try {
                const response = await fetch(`/api/products/update/${productId}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(updatedProduct)
                });

                if (!response.ok) {
                    throw new Error("Failed to update product");
                }

                messageDiv.textContent = "Product updated successfully!";
                messageDiv.className = "message success";

            } catch (error) {
                messageDiv.textContent = "Error updating product.";
                messageDiv.className = "message error";
                console.error(error);
            }
        });

        loadProduct();
    </script>

</body>
</html>
