<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        .table-container {
            width: 95%;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #007bff;
            color: white;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        .low-stock {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Product List</h2>
    
    <div style="text-align:center; margin-top:20px;">
    <a href="/dashboard.html">Dashboard</a> |
    <a href="/product.html">View Products</a>
</div>

    <div style="text-align:center; margin-bottom:20px;">
    <input type="text" id="searchInput" placeholder="Search by name, code, or barcode"
           style="width: 600px; padding: 20px; border:1px solid #ccc; border-radius:6px;"
           onkeyup="filterProducts()">
</div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Code</th>
                    <th>Barcode</th>
                    <th>Category</th>
                    <th>Buying Price</th>
                    <th>Selling Price</th>
                    <th>Quantity</th>
                    <th>Low Stock Level</th>
                    <th>Base Unit</th>
                    <th>Package Name</th>
                    <th>Units Per Package</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="productTableBody">
            </tbody>
        </table>
    </div>

    <script>
    let allProducts = [];

    async function loadProducts() {
        try {
            const response = await fetch("/api/products/all");
            const products = await response.json();

            allProducts = products;
            renderProducts(products);

        } catch (error) {
            console.error("Error loading products:", error);
        }
    }

    function renderProducts(products) {
        const tableBody = document.getElementById("productTableBody");
        tableBody.innerHTML = "";

        products.forEach(product => {
            const row = document.createElement("tr");

            const isLowStock = product.quantity <= product.lowStockLevel;

            row.innerHTML = `
                <td>${product.id}</td>
                <td>${product.name}</td>
                <td>${product.productCode}</td>
                <td>${product.barcode}</td>
                <td>${product.category}</td>
                <td>${product.buyingPrice}</td>
                <td>${product.sellingPrice}</td>
                <td class="${isLowStock ? 'low-stock' : ''}">${product.quantity}</td>
                <td>${product.lowStockLevel}</td>
                <td>${product.baseUnit}</td>
                <td>${product.packageName ?? ''}</td>
                <td>${product.unitsPerPackage ?? ''}</td>
                 <td>
                 <a href="/edit-product.html?id=${product.id}"
                 style="padding:6px 12px; background:#ffc107; color:black; border-radius:4px; text-decoration:none; margin-right:5px; display:inline-block;">
                  Edit
                 </a>

                  <button onclick="deleteProduct(${product.id})"
                   style="padding:6px 12px; background:#dc3545; color:white; border:none; border-radius:4px; cursor:pointer;">
                   Delete
                   </button>
                 </td>
            `;

            tableBody.appendChild(row);
        });
    }

    function filterProducts() {
        const searchValue = document.getElementById("searchInput").value.toLowerCase();

        const filteredProducts = allProducts.filter(product =>
            product.name.toLowerCase().includes(searchValue) ||
            product.productCode.toLowerCase().includes(searchValue) ||
            product.barcode.toLowerCase().includes(searchValue)
        );

        renderProducts(filteredProducts);
    }

    loadProducts();

    async function deleteProduct(id) {
    const confirmDelete = confirm("Are you sure you want to delete this product?");

    if (!confirmDelete) {
        return;
    }

    try {
        const response = await fetch(`/api/products/delete/${id}`, {
            method: "DELETE"
        });

        if (!response.ok) {
            throw new Error("Failed to delete product");
        }

        allProducts = allProducts.filter(product => product.id !== id);
        renderProducts(allProducts);

        alert("Product deleted successfully.");
    } catch (error) {
        alert("Error deleting product.");
        console.error(error);
    }
}
</script>

</body>
</html>
